openapi: 3.1.0
info:
  title: OurPlanetAnalyzing API
  description: Aplikacja do demonstracyjnej analizy klimatu, srodowiska i danych geofizycznych.
  version: 1.1.0
paths:
  /analyze:
    post:
      summary: Analyze
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'
  /generate-report:
    post:
      summary: Generate Report
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
  /status:
    get:
      summary: Status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
components:
  schemas:
    AnalyzeRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
          minLength: 3
          description: Pytanie lub temat analizy dotyczacy stanu planety.
        output_format:
          type: string
          enum:
            - json
            - markdown
          default: json
    AnalyzeResponse:
      type: object
      required:
        - response
        - risk_level
        - recommendations
        - sources
        - generated_at
      properties:
        response:
          type: string
        risk_level:
          type: string
          enum:
            - niski
            - umiarkowany
            - wysoki
        recommendations:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: string
        generated_at:
          type: string
          format: date-time
    ReportResponse:
      type: object
      required:
        - report_id
        - format
        - status
        - summary
        - content
        - generated_at
      properties:
        report_id:
          type: string
        format:
          type: string
          enum:
            - json
            - markdown
        status:
          type: string
          const: generated
        summary:
          type: string
        content:
          type: string
        generated_at:
          type: string
          format: date-time
    StatusResponse:
      type: object
      required:
        - status
        - app_name
        - version
        - generated_at
      properties:
        status:
          type: string
          const: ok
        app_name:
          type: string
        version:
          type: string
        generated_at:
          type: string
          format: date-time
